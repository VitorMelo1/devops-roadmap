# Structured bug-report form.
# Place this file at: .github/ISSUE_TEMPLATE/bug_report.yml
name: "🐛 Bug report"
description: "Report something that isn't working"
title: "[BUG] "
labels: ["bug"]

body:
  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "Describe the bug clearly."
      placeholder: "Ex.: The /login endpoint returns 500."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      placeholder: "Ex.: Should return a JWT token."
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Environment"
      placeholder: "OS, browser/runtime, version"
    validations:
      required: false
