# Dependabot — opens automatic pull requests to update dependencies.
# Place this file at: .github/dependabot.yml
version: 2
updates:
  # JavaScript / Node dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Keep the GitHub Actions themselves up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
